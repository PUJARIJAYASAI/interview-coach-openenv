benchmark: interview_coach
tasks:
  - task_id: easy
    max_steps: 5
    goal: "Achieve an answer score of 8 or higher in 5 steps."
    grader: grade_easy
  - task_id: medium
    max_steps: 10
    goal: "Maintain an answer score above 7 for 10 steps."
    grader: grade_medium
  - task_id: hard
    max_steps: 15
    goal: "Reach an answer score of 10 while handling difficult questions."
    grader: grade_hard
